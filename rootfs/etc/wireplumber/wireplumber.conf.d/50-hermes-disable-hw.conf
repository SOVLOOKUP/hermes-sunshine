# This host only ever streams the virtual "hermes" null sink (defined in
# /etc/pipewire/pipewire.conf.d/10-hermes-null-sink.conf); Hermes captures its
# monitor. The container bind-mounts the host's /dev, so /dev/snd exposes every
# host sound card. Left to its defaults WirePlumber would build a sink node for
# each and its routing policy could send Steam/game audio to a host card instead
# of "hermes" — the monitor Hermes records then stays silent. Disable all
# hardware monitors so "hermes" is the only sink and thus always the default.
wireplumber.profiles = {
    main = {
        monitor.alsa = disabled
        monitor.alsa.reserve-device = disabled
        monitor.alsa-midi = disabled
        monitor.bluez = disabled
        monitor.bluez-midi = disabled
        monitor.libcamera = disabled
        monitor.v4l2 = disabled
    }
}
