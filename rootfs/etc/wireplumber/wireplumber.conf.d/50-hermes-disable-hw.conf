# Force the virtual "hermes" null sink (defined in
# /etc/pipewire/pipewire.conf.d/10-hermes-null-sink.conf, whose monitor Hermes
# records) to be the only audio sink, so it is always the default and Steam/game
# audio can never route elsewhere and leave the stream silent.
#
# The container's device access is already narrowed (see docker-compose.yml): it
# is NOT granted the ALSA char major, so host sound cards under /dev/snd are not
# even reachable. Disabling WirePlumber's hardware monitors makes that explicit
# and robust — it never tries to enumerate ALSA / Bluetooth / camera devices it
# cannot open (no error spam, no wasted probing), and it keeps holding even if
# the device rules are ever widened again.
wireplumber.profiles = {
    main = {
        monitor.alsa = disabled
        monitor.alsa.reserve-device = disabled
        monitor.alsa-midi = disabled
        monitor.bluez = disabled
        monitor.bluez-midi = disabled
        monitor.libcamera = disabled
        monitor.v4l2 = disabled
    }
}
