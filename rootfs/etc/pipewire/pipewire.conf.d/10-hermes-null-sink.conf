# Always-present virtual sink that Hermes captures.
#
# Hermes records the ".monitor" of the sink named "hermes" (pinned via
# audio_sink=hermes in sunshine.conf); apps render into it as the default sink.
# Defining it here — instead of `pactl load-module module-null-sink` at runtime —
# means the node is recreated automatically by the pipewire daemon on every
# (re)start, so the audio watchdog never has to rebuild it.
#
# object.linger keeps the node alive with no clients connected; the FL/FR layout
# gives Moonlight a normal stereo stream.
context.objects = [
    {   factory = adapter
        args = {
            factory.name            = support.null-audio-sink
            node.name               = "hermes"
            node.description        = "Hermes Virtual Sink"
            media.class             = Audio/Sink
            object.linger           = true
            audio.position          = [ FL FR ]
            monitor.channel-volumes = true
        }
    }
]
