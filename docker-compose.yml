services:
  sunshine:
    # Published image (built & pushed by the bundled GitHub Actions workflow).
    # image: ghcr.io/sovlookup/hermes-sunshine:latest
    # China users: swap the line above for the Nanjing University GHCR mirror to
    # pull much faster (uncomment this, comment the ghcr.io line above):
    # image: ghcr.nju.edu.cn/sovlookup/hermes-sunshine:latest
    #
    # Steam Big Picture: stream the "Steam Big Picture" app to launch Steam at
    # the client's resolution (see README). Use the parallel "-steam" tag:
    image: ghcr.io/sovlookup/hermes-sunshine:latest-steam
    # image: ghcr.nju.edu.cn/sovlookup/hermes-sunshine:latest-steam

    container_name: sunshine
    restart: unless-stopped

    # Host networking = the most reliable client auto-discovery. Requires a Linux
    # Docker engine. On Docker Desktop, comment this out and use "ports:" below.
    network_mode: host

    # Screen capture (KMS/DRM) and virtual input both need these.
    ipc: host
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      # Steam's sandbox (pressure-vessel / bubblewrap) creates a nested mount
      # namespace and does `mount --make-rslave /` inside it. That recursive
      # remount also touches the read-only / masked system paths runc locks into
      # a default container (/proc/kcore, /sys/firmware, …), which can't be
      # re-propagated even with SYS_ADMIN — bwrap dies with "Failed to make /
      # slave: Permission denied" (rc=71). systempaths=unconfined drops those
      # locked mounts so the recursive rslave succeeds. Only needed for the
      # -steam image; harmless on the plain image.
      - systempaths=unconfined
      # On hosts where AppArmor is loaded (Ubuntu/Debian), its default docker
      # profile also denies those same mount() calls. Unconfining is a no-op
      # where AppArmor isn't loaded (e.g. Arch/CachyOS). (User namespaces must
      # also be enabled on the host — the norm on modern kernels; see README.)
      - apparmor=unconfined

    # Full host device passthrough. Mounting all of /dev makes every
    # kernel-created node visible in the container — crucially the dynamically
    # numbered /dev/hidraw* nodes the hid-playstation / hid-nintendo drivers
    # spawn when Hermes' inputtino builds a DualSense (PS5) / Switch Pro pad on
    # /dev/uhid. Those hidraw nodes unlock the full controller feature set
    # (adaptive triggers, LED, HD rumble) on top of the buttons / sticks / gyro /
    # touchpad / basic rumble the /dev/uinput + /dev/uhid + evdev path already
    # provides. Because hidraw's char major is allocated dynamically (no fixed
    # number to whitelist), the device cgroup has to allow ALL char devices. This
    # is broad — it grants the container access to every host char device — and
    # is the trade-off for the complete gamepad experience. Drop back to the
    # narrow setup (explicit devices + 'c 13:* rmw' + a /dev/input bind) if you
    # don't need the advanced DualSense features.
    #
    # We deliberately do NOT bind-mount the host's /run/udev: the entrypoint runs
    # its own udevd (it relays the Hermes-KMS DRM hotplug to sway) which needs a
    # writable /run/udev, and that same in-container udevd labels the hidraw/
    # input nodes as they appear at stream time, so libudev enumeration works
    # without the host database.
    device_cgroup_rules:
      - 'c *:* rmw'

    # /dev/dri (GPU + Hermes-KMS card), /dev/uinput and /dev/uhid are already
    # covered by the /dev bind below; kept as explicit documentation of the
    # devices this image relies on.
    devices:
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
      - /dev/uhid:/dev/uhid

    volumes:
      - ./config:/config
      # Follow the host timezone automatically (read-only).
      - /etc/localtime:/etc/localtime:ro
      # Full device tree (see device_cgroup_rules above). Supersedes a narrow
      # /dev/input bind: besides the evdev nodes it also brings in the
      # dynamically numbered /dev/hidraw* nodes needed for full DualSense /
      # Switch Pro support.
      - /dev:/dev
    # ---- Advanced (optional) ------------------------------------------------
    # Everything below is optional; the image ships sensible defaults.

    # Override any of the defaults here. Uncomment the whole block to use it.
    # environment:
    #   TZ: Asia/Shanghai        # force a timezone instead of following the host
    #   HERMES_KMS: auto         # virtual display: auto | on | off
    #   DISPLAY_WIDTH: "1920"
    #   DISPLAY_HEIGHT: "1080"
    #   DISPLAY_REFRESH: "60"
    #   START_COMPOSITOR: "true" # Wayland (sway) session
    #   START_PULSE: "true"
    #   START_AVAHI: "true"
    #   ENABLE_XWAYLAND: "true"  # X11 app compatibility
    #   AUTOSTART_STEAM: "true"  # -steam image only: register Steam Big Picture app

    # Explicit port mappings — use these ONLY when you cannot use host
    # networking (e.g. Docker Desktop). Comment out "network_mode: host" first.
    # ports:
    #   - "47984-47990:47984-47990/tcp"
    #   - "48010:48010/tcp"
    #   - "47998-48000:47998-48000/udp"

    # NVIDIA GPUs — install the NVIDIA Container Toolkit on the host, then
    # uncomment. Merge NVIDIA_* into the "environment:" block above (a service
    # may only have one "environment:" key).
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all
    #   NVIDIA_DRIVER_CAPABILITIES: all

    # Build locally instead of pulling the published image:
    #   docker compose build
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     HERMES_REF: latest       # or a specific tag, e.g. v0.4.0
    #     USE_CN_MIRROR: "true"    # fast USTC/Tsinghua mirrors (set false abroad)
